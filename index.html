<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ftodo Starter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <h1>ftodo Starter</h1>
        <p>Begin development with HTML, CSS, and JavaScript.</p>
      </header>

      <main class="app-main">
        <section class="card">
          <h2>Welcome</h2>
          <p>This is your starter template. Open the browser console to confirm the script loaded.</p>
          <button id="startButton" class="primary-button">Click me</button>
          <p id="statusMessage" class="status-message">Ready to build.</p>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
